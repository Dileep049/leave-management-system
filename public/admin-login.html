<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - College Leave System</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2a5298;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2a5298;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1e3c72;
    }

    .back {
      text-align: center;
      margin-top: 10px;
    }

    .back a {
      text-decoration: none;
      color: #2a5298;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <!-- IMPORTANT: action must be /admin-login -->
  <form action="/admin-login" method="POST">
    <input type="email" name="email" placeholder="Enter Admin Email" required>
    <input type="password" name="password" placeholder="Enter Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="back">
    <a href="/login.html">Back to Student Login</a>
  </div>
</div>

</body>
</html>
